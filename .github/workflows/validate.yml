name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Least privilege: read-only is all the validation/build jobs need (checkout
# requires contents: read).
permissions:
  contents: read

# Opt the bundled JS actions into the Node 24 runtime ahead of GitHub forcing it
# (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-hacs:
    # Validates the head repo, not the diff — and a fork has no release asset
    # for it to find, so it can only ever fail there. `build` still runs.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
